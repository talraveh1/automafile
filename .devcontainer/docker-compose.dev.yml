# Override applied by VS Code Dev Containers on top of ../compose.yml.
# Swaps PID 1 to a no-op so VS Code can attach. Run the app yourself from
# a VS Code terminal, e.g. `dnd watch`.

services:
  dragndoc:
    command: ["sleep", "infinity"]
    restart: "no"
    volumes:
      - "C:/Users/trax7/.claude:/home/dragndoc/.claude"
      - "C:/Users/trax7/.claude.json:/home/dragndoc/.claude.json"
      - "C:/Users/trax7/.codex:/home/dragndoc/.codex"
      - "C:/Users/trax7/.gemini:/home/dragndoc/.gemini"
      - "C:/Users/trax7/.copilot:/home/dragndoc/.copilot"
      # persist VS Code Server across container recreations so reattach is fast
      - vscode-server:/home/dragndoc/.vscode-server

volumes:
  vscode-server:
