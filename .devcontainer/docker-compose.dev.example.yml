# Override applied by VS Code Dev Containers on top of ../compose.yml.
# Copy this file to docker-compose.dev.yml and edit the host paths below.
# Swaps PID 1 to a no-op so VS Code can attach. Run the app yourself from
# a VS Code terminal, e.g. `automafile watch`.

services:
  automafile:
    command: ["sleep", "infinity"]
    restart: "no"
    volumes:
      # AI tool configs — REPLACE the host paths with yours
      - "C:/Users/<you>/.claude:/home/automafile/.claude"
      - "C:/Users/<you>/.claude.json:/home/automafile/.claude.json"
      - "C:/Users/<you>/.codex:/home/automafile/.codex"
      - "C:/Users/<you>/.gemini:/home/automafile/.gemini"
      - "C:/Users/<you>/.copilot:/home/automafile/.copilot"
      # persist VS Code Server across container recreations so reattach is fast
      - vscode-server:/home/automafile/.vscode-server

volumes:
  vscode-server:
