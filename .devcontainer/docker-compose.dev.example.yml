# Override applied by VS Code Dev Containers on top of ../compose.yml.
# Copy this file to docker-compose.dev.yml and edit the host paths below.
# Reuses the same supervisor entrypoint as the normal container so Docker
# still sees the watcher logs and restarts on unexpected crashes. Use
# `dnd watch stop` to pause the watcher without stopping the container,
# and `dnd watch start` to resume it.

services:
  dragndoc:
    volumes:
      # AI tool configs — REPLACE the host paths with yours
      - "C:/Users/<you>/.claude:/home/dragndoc/.claude"
      - "C:/Users/<you>/.claude.json:/home/dragndoc/.claude.json"
      - "C:/Users/<you>/.codex:/home/dragndoc/.codex"
      - "C:/Users/<you>/.gemini:/home/dragndoc/.gemini"
      - "C:/Users/<you>/.copilot:/home/dragndoc/.copilot"
      # persist VS Code Server across container recreations so reattach is fast
      - vscode-server:/home/dragndoc/.vscode-server

volumes:
  vscode-server:
