# Compose configuration for Drag'n'Doc.
# Copy this file to compose.yml and edit the documents bind-mount path.
# Works under Docker Desktop, Podman Desktop, or any Compose-compatible runtime.

services:
  dragndoc:
    build: .
    image: dragndoc:latest
    container_name: dragndoc
    restart: unless-stopped

    environment:
      DOCS: /docs
      OLLAMA_URL: http://host.docker.internal:11434
      LOGS_LEVEL: INFO

    volumes:
      # the project workspace — code lives on the host, runs in the container
      - .:/workspace

      # private Linux venv layered over the bind mount so the host can keep a
      # Windows .venv at the same repo path without the two environments
      # clobbering each other
      - dragndoc-venv:/workspace/.venv

      # the user's documents tree — REPLACE the host path with yours
      - "C:/Users/<you>/OneDrive/Documents:/docs"

      # host git identity (read-only) — REPLACE with your gitconfig path
      # (drop this line if you don't want git inside the container to know who you are)
      - "C:/Users/<you>/.gitconfig:/home/dragndoc/.gitconfig:ro"

    # makes Ollama on the host reachable from inside the container.
    # required on native-Linux Docker; redundant (no-op) on Docker Desktop and
    # Podman Desktop, which already inject host.docker.internal automatically.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    working_dir: /workspace
    command: ["dnd", "watch", "supervise"]

volumes:
  dragndoc-venv:
